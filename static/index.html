<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Wy Glass :: Control Deck</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 240 150'%3E%3Cpath d='M22 68 C6 60, 4 42, 20 30' stroke='%2328f5e0' stroke-width='11' stroke-linecap='round' fill='none'/%3E%3Cpath d='M218 68 C234 60, 236 42, 220 30' stroke='%2328f5e0' stroke-width='11' stroke-linecap='round' fill='none'/%3E%3Cpath d='M108 72 H132' stroke='%2328f5e0' stroke-width='11' stroke-linecap='round' fill='none'/%3E%3Crect x='18' y='48' width='92' height='72' rx='20' stroke='%2328f5e0' stroke-width='11' fill='black'/%3E%3Crect x='130' y='48' width='92' height='72' rx='20' stroke='%2328f5e0' stroke-width='11' fill='black'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#07090b;
    --bg-1:#0d1116;
    --bg-2:#121821;
    --panel-border:#1e2a35;
    --cyan:#28f5e0;
    --cyan-dim:#1a8a80;
    --amber:#ffb020;
    --amber-dim:#8a5f10;
    --green:#3dffa0;
    --red:#ff4d6a;
    --text-0:#e8f3f2;
    --text-1:#8fa3a8;
    --text-2:#516066;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    overflow-x:hidden;
    background:
      radial-gradient(circle at 15% 0%, rgba(40,245,224,0.06), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(255,176,32,0.05), transparent 45%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px),
      var(--bg-0);
    color:var(--text-0);
    font-family:'JetBrains Mono', monospace;
    min-height:100vh;
    padding:28px 32px 60px;
  }
  h1,h2,h3,.display{font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:0.04em;}

  /* ---------- header ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--panel-border);
    padding-bottom:18px; margin-bottom:28px;
    flex-wrap:wrap; gap:16px;
  }
  .brand{display:flex; align-items:center; gap:16px;}
  .brand svg{filter:drop-shadow(0 0 6px rgba(40,245,224,0.5));}
  .brand-text .display{font-size:26px; color:var(--text-0); line-height:1; text-transform:uppercase;}
  .brand-text .sub{font-size:11px; color:var(--text-2); letter-spacing:0.15em; text-transform:uppercase; margin-top:4px;}

  .topbar-right{display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
  .navlink{color:var(--text-1); text-decoration:none; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; border:1px solid var(--panel-border); padding:8px 14px;}
  .navlink:hover{color:var(--cyan); border-color:var(--cyan-dim);}

  .switch{display:flex; align-items:center; gap:10px; background:var(--bg-1); border:1px solid var(--panel-border); padding:8px 16px;}
  .switch .lbl{font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-1);}
  .switch .toggle{position:relative; width:38px; height:20px; background:var(--bg-0); border:1px solid var(--panel-border); cursor:pointer; flex-shrink:0;}
  .switch .toggle::after{content:''; position:absolute; top:2px; left:2px; width:14px; height:14px; background:var(--text-2); transition:all .15s;}
  .switch .toggle.on{border-color:var(--red);}
  .switch .toggle.on::after{left:20px; background:var(--red); box-shadow:0 0 8px var(--red);}
  .switch.armed .lbl{color:var(--red);}

  .status-pill{
    display:flex; align-items:center; gap:10px;
    background:var(--bg-1); border:1px solid var(--panel-border);
    padding:8px 16px; border-radius:2px;
  }
  .dot{width:9px; height:9px; border-radius:50%; background:var(--text-2); flex-shrink:0;}
  .dot.on{background:var(--green); box-shadow:0 0 10px var(--green); animation:pulse 1.8s infinite;}
  .dot.off{background:var(--red); box-shadow:0 0 8px var(--red);}
  .dot.batt-good{background:var(--green); box-shadow:0 0 10px var(--green);}
  .dot.batt-warn{background:var(--amber); box-shadow:0 0 10px var(--amber);}
  .dot.batt-low{background:var(--red); box-shadow:0 0 8px var(--red); animation:pulse 1.2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:0.35;}}
  .status-text{font-size:12px; letter-spacing:0.06em;}
  .status-text .msg{color:var(--text-1);}

  /* ---------- layout ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:20px;
    margin-bottom:24px;
  }
  @media (max-width:980px){ .grid{grid-template-columns:1fr;} }

  .card{
    background:linear-gradient(180deg, var(--bg-1), var(--bg-2));
    border:1px solid var(--panel-border);
    position:relative;
    padding:20px;
    min-width:0;
    clip-path:polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
  }
  .card::before{
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg, var(--cyan), transparent 70%);
    opacity:0.7;
  }
  .card-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px;}
  .card-head .display{font-size:19px; text-transform:uppercase; color:var(--text-0);}
  .badge{
    font-size:10px; letter-spacing:0.08em; text-transform:uppercase;
    padding:3px 8px; border:1px solid; white-space:nowrap;
  }
  .badge.high{color:var(--green); border-color:var(--green); background:rgba(61,255,160,0.08);}
  .badge.experimental{color:var(--amber); border-color:var(--amber); background:rgba(255,176,32,0.08);}

  label{display:block; font-size:10px; color:var(--text-2); text-transform:uppercase; letter-spacing:0.08em; margin:12px 0 5px;}
  select, input{
    width:100%; background:var(--bg-0); border:1px solid var(--panel-border); color:var(--text-0);
    padding:8px 10px; font-family:'JetBrains Mono',monospace; font-size:13px; border-radius:1px;
  }
  select:focus, input:focus{outline:none; border-color:var(--cyan);}

  .btn{
    font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
    font-size:13px; cursor:pointer; border:1px solid var(--cyan-dim); background:transparent; color:var(--cyan);
    padding:9px 16px; transition:all .15s;
  }
  .btn:hover{background:rgba(40,245,224,0.1); border-color:var(--cyan);}
  .btn.test{width:100%; margin-top:16px;}
  .btn.save{background:var(--cyan); color:var(--bg-0); border-color:var(--cyan); font-size:14px; padding:12px 28px;}
  .btn.save:hover{box-shadow:0 0 16px rgba(40,245,224,0.4);}

  /* ---------- log ---------- */
  .logpanel{
    background:var(--bg-1); border:1px solid var(--panel-border);
    height:260px; overflow-y:auto; padding:14px 16px; font-size:12px;
  }
  .logpanel .line{display:flex; gap:10px; padding:2px 0; opacity:0; animation:fadein .25s forwards;}
  @keyframes fadein{to{opacity:1;}}
  .logpanel .t{color:var(--text-2); flex-shrink:0;}
  .logpanel .tag{flex-shrink:0; width:110px;}
  .logpanel .raw{color:var(--text-1);}
  .logpanel .gesture{color:var(--cyan); font-weight:700;}
  .logpanel .filtered{color:var(--amber-dim);}
  .logpanel .ok{color:var(--green);}
  .logpanel .fail{color:var(--red);}

  .section-title{font-size:13px; color:var(--text-1); text-transform:uppercase; letter-spacing:0.1em; margin:0 0 12px;}

  .savebar{
    position:sticky; bottom:0; display:flex; align-items:center; gap:16px;
    background:var(--bg-0); padding:16px 0 4px; margin-top:8px;
  }
  #savemsg{font-size:12px; color:var(--text-2);}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <svg width="46" height="29" viewBox="0 0 240 150" fill="none">
      <path d="M22 68 C6 60, 4 42, 20 30" stroke="#28f5e0" stroke-width="9" stroke-linecap="round"/>
      <path d="M218 68 C234 60, 236 42, 220 30" stroke="#28f5e0" stroke-width="9" stroke-linecap="round"/>
      <path d="M108 72 H132" stroke="#28f5e0" stroke-width="9" stroke-linecap="round"/>
      <rect x="18" y="48" width="92" height="72" rx="20" stroke="#28f5e0" stroke-width="9"/>
      <rect x="130" y="48" width="92" height="72" rx="20" stroke="#28f5e0" stroke-width="9"/>
      <circle cx="42" cy="80" r="7" stroke="#28f5e0" stroke-width="6"/>
      <path d="M148 76 H176" stroke="#28f5e0" stroke-width="6" stroke-linecap="round"/>
      <path d="M148 92 H164" stroke="#28f5e0" stroke-width="6" stroke-linecap="round"/>
    </svg>
    <div class="brand-text">
      <div class="display" id="devname">W AI 4 :: CONTROL DECK</div>
      <div class="sub" id="devfw">firmware —</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="switch" id="actionsswitch">
      <span class="lbl">Ações reais</span>
      <div class="toggle" id="actionstoggle"></div>
    </div>
    <a class="navlink" href="/">← Wy Glass</a>
    <a class="navlink" href="/test">Painel de testes →</a>
    <div class="status-pill" id="batterypill" style="display:none;">
      <div class="dot" id="batterydot"></div>
      <div class="status-text">
        <span id="batterytext">--%</span> · <span class="msg">bateria</span>
      </div>
    </div>
    <div class="status-pill">
      <div class="dot off" id="statusdot"></div>
      <div class="status-text">
        <span id="statustitle">DESCONECTADO</span> · <span class="msg" id="statusmsg">iniciando...</span>
      </div>
    </div>
  </div>
</div>

<div class="section-title" id="title1">Botão 1</div>
<div class="grid" id="gesturegrid1"></div>

<div class="section-title" id="title2">Botão 2</div>
<div class="grid" id="gesturegrid2"></div>

<div class="section-title">Log ao vivo (BLE)</div>
<div class="logpanel" id="log"></div>

<div class="savebar">
  <button class="btn save" id="savebtn">Salvar configuração</button>
  <span id="savemsg"></span>
</div>

<script>
const ACTION_FIELDS = {
  run_command: [
    {key:'command', label:'Comando / caminho do .exe', type:'text'},
    {key:'args', label:'Argumentos (separados por vírgula)', type:'text', isList:true},
  ],
  open_url: [
    {key:'url', label:'URL', type:'text'},
  ],
  key_shortcut: [
    {key:'keys', label:'Atalho (ex: ctrl+shift+s)', type:'text'},
  ],
  screenshot: [
    {key:'folder', label:'Pasta de destino', type:'text'},
  ],
  voice_command: [
    {key:'duration_seconds', label:'Duração da gravação (s)', type:'number'},
    {key:'folder', label:'Pasta de destino', type:'text'},
  ],
  jarvis_voice_agent: [
    {key:'provider', label:'Provedor de IA', type:'select', options:[
      {value:'gemini', label:'Gemini (Google)'},
      {value:'groq', label:'Groq (Llama / Qwen / GPT-OSS)'},
      {value:'openrouter', label:'OpenRouter (modelos :free)'},
      {value:'mistral', label:'Mistral (La Plateforme)'},
      {value:'ollama', label:'Ollama (local, neste PC)'},
    ]},
    {key:'google_api_key', label:'Google API Key (só p/ provedor Gemini)', type:'password'},
    {key:'api_key', label:'Chave de API (Groq / OpenRouter / Mistral)', type:'password'},
    {key:'stt_api_key', label:'Chave Groq p/ transcrever áudio (obrigatória se o provedor não for Gemini nem Groq)', type:'password'},
    {key:'ollama_host', label:'IP/host do Ollama (padrão: 127.0.0.1)', type:'text'},
    {key:'model', label:'Modelo (vazio = padrão do provedor)', type:'text'},
    {key:'system_prompt', label:'Prompt de sistema', type:'text'},
    {key:'tts_model', label:'Modelo de voz (Piper, arquivo .onnx)', type:'text'},
    {key:'max_duration_seconds', label:'Duração máxima de gravação (s)', type:'number'},
    {key:'silence_duration_seconds', label:'Silêncio p/ parar (s)', type:'number'},
    {key:'silence_threshold', label:'Limiar de silêncio (RMS)', type:'number'},
  ],
  stop_conversation: [
    {key:'farewell_text', label:'Frase de despedida', type:'text'},
    {key:'tts_model', label:'Modelo de voz (Piper, arquivo .onnx)', type:'text'},
  ],
};
const ACTION_LABELS = {
  run_command:'Executar comando', open_url:'Abrir URL', key_shortcut:'Atalho de teclado',
  screenshot:'Screenshot', voice_command:'Comando de voz (gravar)', jarvis_voice_agent:'Wy Glass (IA por voz)',
  stop_conversation:'Encerrar conversa',
};

let config = null;

async function loadConfig(){
  const res = await fetch('/api/config');
  config = await res.json();
  document.getElementById('devname').textContent = (config.device_name || 'GLASSES') + ' :: CONTROL DECK';
  document.getElementById('devfw').textContent = 'firmware ' + (config.firmware || '—') + ' · ' + config.device_address;
  renderGrid();
  setActionsToggle(!!config.actions_enabled);

  const status = await (await fetch('/api/status')).json();
  if (status.battery_percent !== null && status.battery_percent !== undefined){
    setBattery(status.battery_percent, status.battery_percent <= status.battery_low_threshold);
  }
}

function setActionsToggle(on){
  document.getElementById('actionstoggle').className = 'toggle' + (on ? ' on' : '');
  document.getElementById('actionsswitch').className = 'switch' + (on ? ' armed' : '');
}

document.getElementById('actionstoggle').addEventListener('click', async () => {
  const on = !document.getElementById('actionstoggle').classList.contains('on');
  await fetch('/api/actions_enabled', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({enabled:on})});
  config.actions_enabled = on;
  setActionsToggle(on);
});

function renderGrid(){
  const grid1 = document.getElementById('gesturegrid1');
  const grid2 = document.getElementById('gesturegrid2');
  grid1.innerHTML = '';
  grid2.innerHTML = '';
  for (const [key, g] of Object.entries(config.gestures)){
    const card = document.createElement('div');
    card.className = 'card';
    const badgeClass = g.reliability === 'experimental' ? 'experimental' : 'high';
    const badgeText = g.reliability === 'experimental' ? 'experimental' : 'alta confiabilidade';

    card.innerHTML = `
      <div class="card-head">
        <div class="display">${g.label}</div>
        <div class="badge ${badgeClass}">${badgeText}</div>
      </div>
      <label>Ação</label>
      <select data-gesture="${key}" class="action-select">
        ${Object.entries(ACTION_LABELS).map(([k,v]) =>
          `<option value="${k}" ${k===g.action?'selected':''}>${v}</option>`).join('')}
      </select>
      <div class="fields" data-gesture="${key}"></div>
      <button class="btn test" data-gesture="${key}">Testar ação</button>
    `;
    (key.startsWith('button1') ? grid1 : grid2).appendChild(card);
    renderFields(key);
  }
  document.getElementById('title1').style.display = grid1.children.length ? '' : 'none';
  document.getElementById('title2').style.display = grid2.children.length ? '' : 'none';

  document.querySelectorAll('.action-select').forEach(sel => {
    sel.addEventListener('change', e => {
      const key = e.target.dataset.gesture;
      config.gestures[key].action = e.target.value;
      if (!config.gestures[key].params) config.gestures[key].params = {};
      renderFields(key);
    });
  });
  document.querySelectorAll('.btn.test').forEach(btn => {
    btn.addEventListener('click', async e => {
      const key = e.target.dataset.gesture;
      await fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(config)});
      await fetch(`/api/test/${key}`, {method:'POST'});
    });
  });
}

function renderFields(gestureKey){
  const g = config.gestures[gestureKey];
  const container = document.querySelector(`.fields[data-gesture="${gestureKey}"]`);
  const fields = ACTION_FIELDS[g.action] || [];
  container.innerHTML = fields.map(f => {
    let val = g.params?.[f.key];
    if (f.isList) val = Array.isArray(val) ? val.join(', ') : '';
    if (f.type === 'select'){
      const opts = f.options.map(o => `<option value="${o.value}"${o.value === val ? ' selected' : ''}>${o.label}</option>`).join('');
      return `<label>${f.label}</label>
        <select data-gesture="${gestureKey}" data-field="${f.key}">${opts}</select>`;
    }
    return `<label>${f.label}</label>
      <input type="${f.type}" data-gesture="${gestureKey}" data-field="${f.key}" data-islist="${!!f.isList}" value="${val ?? ''}">`;
  }).join('');

  container.querySelectorAll('input, select').forEach(inp => {
    const handler = e => {
      const key = e.target.dataset.gesture;
      const field = e.target.dataset.field;
      const isList = e.target.dataset.islist === 'true';
      if (!config.gestures[key].params) config.gestures[key].params = {};
      config.gestures[key].params[field] = isList
        ? e.target.value.split(',').map(s => s.trim()).filter(Boolean)
        : e.target.value;
    };
    inp.addEventListener('input', handler);
    inp.addEventListener('change', handler);
  });
}

document.getElementById('savebtn').addEventListener('click', async () => {
  const msg = document.getElementById('savemsg');
  const res = await fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(config)});
  msg.textContent = res.ok ? 'salvo às ' + new Date().toLocaleTimeString() : 'erro ao salvar';
  setTimeout(()=> msg.textContent='', 4000);
});

function logLine(html){
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = html;
  log.appendChild(div);
  while (log.children.length > 300) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

function setBattery(percent, low){
  const pill = document.getElementById('batterypill');
  pill.style.display = 'flex';
  document.getElementById('batterytext').textContent = percent + '%';
  const dot = document.getElementById('batterydot');
  dot.className = 'dot ' + (low ? 'batt-low' : percent <= 50 ? 'batt-warn' : 'batt-good');
}

function connectWS(){
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = (ev) => {
    const d = JSON.parse(ev.data);
    if (d.type === 'status'){
      document.getElementById('statusdot').className = 'dot ' + (d.connected ? 'on' : 'off');
      document.getElementById('statustitle').textContent = d.connected ? 'CONECTADO' : 'DESCONECTADO';
      document.getElementById('statusmsg').textContent = d.message;
    } else if (d.type === 'battery'){
      setBattery(d.percent, d.low);
    } else if (d.type === 'raw'){
      logLine(`<span class="t">${d.time}</span><span class="tag raw">raw</span><span class="raw">${d.hex}</span>`);
    } else if (d.type === 'filtered'){
      logLine(`<span class="t">${d.time}</span><span class="tag filtered">filtrado</span><span class="filtered">${d.reason} — ${d.hex}</span>`);
    } else if (d.type === 'gesture'){
      const note = d.note ? ' ('+d.note+')' : '';
      logLine(`<span class="t">${d.time}</span><span class="tag gesture">${d.gesture}</span><span class="gesture">${d.label}${note}</span>`);
    } else if (d.type === 'action_result'){
      const cls = d.ok ? 'ok' : 'fail';
      logLine(`<span class="t">${d.time}</span><span class="tag ${cls}">acao</span><span class="${cls}">${d.message}</span>`);
    } else if (d.type === 'actions_enabled'){
      config.actions_enabled = d.enabled;
      setActionsToggle(d.enabled);
    }
  };
  ws.onclose = () => setTimeout(connectWS, 1500);
}

loadConfig();
connectWS();
</script>
</body>
</html>
