<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Wy Glass :: Painel de Testes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 240 150'%3E%3Cpath d='M22 68 C6 60, 4 42, 20 30' stroke='%2328f5e0' stroke-width='11' stroke-linecap='round' fill='none'/%3E%3Cpath d='M218 68 C234 60, 236 42, 220 30' stroke='%2328f5e0' stroke-width='11' stroke-linecap='round' fill='none'/%3E%3Cpath d='M108 72 H132' stroke='%2328f5e0' stroke-width='11' stroke-linecap='round' fill='none'/%3E%3Crect x='18' y='48' width='92' height='72' rx='20' stroke='%2328f5e0' stroke-width='11' fill='black'/%3E%3Crect x='130' y='48' width='92' height='72' rx='20' stroke='%2328f5e0' stroke-width='11' fill='black'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#07090b; --bg-1:#0d1116; --bg-2:#121821; --panel-border:#1e2a35;
    --cyan:#28f5e0; --cyan-dim:#1a8a80; --amber:#ffb020; --amber-dim:#8a5f10;
    --green:#3dffa0; --red:#ff4d6a; --violet:#b98bff;
    --text-0:#e8f3f2; --text-1:#8fa3a8; --text-2:#516066;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    overflow-x:hidden;
    background:
      radial-gradient(circle at 15% 0%, rgba(40,245,224,0.06), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(185,139,255,0.05), transparent 45%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px),
      var(--bg-0);
    color:var(--text-0); font-family:'JetBrains Mono', monospace;
    min-height:100vh; padding:28px 32px 60px;
  }
  h1,.display{font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:0.04em;}

  .topbar{display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--panel-border); padding-bottom:18px; margin-bottom:24px; flex-wrap:wrap; gap:16px;}
  .display.title{font-size:24px; text-transform:uppercase;}
  .navlink{color:var(--text-1); text-decoration:none; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; border:1px solid var(--panel-border); padding:8px 14px;}
  .navlink:hover{color:var(--cyan); border-color:var(--cyan-dim);}

  .counters{display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px;}
  .counter{background:linear-gradient(180deg,var(--bg-1),var(--bg-2)); border:1px solid var(--panel-border); padding:16px 18px; min-width:0;}
  .counter .n{font-family:'Rajdhani',sans-serif; font-size:34px; font-weight:700; line-height:1;}
  .counter .l{font-size:11px; color:var(--text-1); text-transform:uppercase; letter-spacing:0.08em; margin-top:6px;}
  .counter.b1 .n{color:var(--cyan);}
  .counter.b2 .n{color:var(--violet);}
  .counter.hb .n{color:var(--amber-dim);}
  .counter.unk .n{color:var(--text-2);}

  .markrow{display:flex; gap:10px; margin-bottom:20px;}
  .markrow input{flex:1; background:var(--bg-1); border:1px solid var(--panel-border); color:var(--text-0); padding:10px 14px; font-family:'JetBrains Mono',monospace; font-size:13px;}
  .markrow input:focus{outline:none; border-color:var(--violet);}
  .btn{font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; font-size:13px; cursor:pointer; border:1px solid var(--violet); background:transparent; color:var(--violet); padding:10px 20px; transition:all .15s;}
  .btn:hover{background:rgba(185,139,255,0.1);}

  .section-title{font-size:13px; color:var(--text-1); text-transform:uppercase; letter-spacing:0.1em; margin:0 0 12px;}
  .logpanel{background:var(--bg-1); border:1px solid var(--panel-border); height:480px; overflow-y:auto; padding:14px 16px; font-size:12px;}
  .logpanel .line{display:flex; gap:10px; padding:3px 0; opacity:0; animation:fadein .2s forwards; border-bottom:1px solid rgba(255,255,255,0.02);}
  @keyframes fadein{to{opacity:1;}}
  .logpanel .t{color:var(--text-2); flex-shrink:0;}
  .logpanel .tag{flex-shrink:0; width:90px; text-transform:uppercase; font-size:10px; padding-top:2px;}
  .logpanel .hexv{color:var(--text-1); word-break:break-all;}
  .tag.b1{color:var(--cyan);} .hexv.b1{color:var(--cyan);}
  .tag.b2{color:var(--violet);} .hexv.b2{color:var(--violet);}
  .tag.hb{color:var(--amber-dim);} .hexv.hb{color:var(--amber-dim);}
  .tag.tel{color:var(--text-2);} .hexv.tel{color:var(--text-2);}
  .tag.unk{color:var(--text-1);}
  .tag.mark{color:var(--green);} .hexv.mark{color:var(--green); font-weight:700;}
</style>
</head>
<body>

<div class="topbar">
  <div class="display title">Painel de Testes :: Diagnóstico BLE</div>
  <a class="navlink" href="/">← Control Deck</a>
</div>

<div class="counters">
  <div class="counter b1"><div class="n" id="cnt-b1">0</div><div class="l">Botão 1</div></div>
  <div class="counter b2"><div class="n" id="cnt-b2">0</div><div class="l">Botão 2</div></div>
  <div class="counter hb"><div class="n" id="cnt-hb">0</div><div class="l">Heartbeat / telemetria</div></div>
  <div class="counter unk"><div class="n" id="cnt-unk">0</div><div class="l">Desconhecido</div></div>
</div>

<div class="marktow">
  <div class="section-title">Marcar evento manual (ex: "botão 1 longo") — aparece no log na hora que você aperta Enter</div>
  <div class="markrow">
    <input id="markinput" placeholder="descreva o que você acabou de fazer e aperte Enter...">
    <button class="btn" id="markbtn">Marcar</button>
  </div>
</div>

<div class="section-title">Feed bruto ao vivo</div>
<div class="logpanel" id="log"></div>

<script>
let counts = {b1:0, b2:0, hb:0, unk:0};

function classify(hex){
  const b = hex;
  if (b.length === 12 && b.startsWith('bc030301') && b[8]===b[10] && b[9]===b[11] && (b.slice(8,10)==='01'||b.slice(8,10)==='02')){
    return b.slice(8,10) === '01' ? 'b1' : 'b2';
  }
  if (b.startsWith('bc07')) return 'hb';
  if (b.startsWith('bc09')) return 'tel';
  return 'unk';
}

function bump(cls){
  if (cls==='b1'||cls==='b2'||cls==='hb'||cls==='tel'){
    const key = (cls==='tel') ? 'hb' : cls;
    counts[key]++;
  } else {
    counts.unk++;
  }
  document.getElementById('cnt-b1').textContent = counts.b1;
  document.getElementById('cnt-b2').textContent = counts.b2;
  document.getElementById('cnt-hb').textContent = counts.hb;
  document.getElementById('cnt-unk').textContent = counts.unk;
}

function logLine(html){
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = html;
  log.appendChild(div);
  while (log.children.length > 500) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

const LABELS = {b1:'botão 1', b2:'botão 2', hb:'heartbeat', tel:'telemetria', unk:'desconhecido'};

function connectWS(){
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = (ev) => {
    const d = JSON.parse(ev.data);
    if (d.type === 'raw'){
      const cls = classify(d.hex);
      bump(cls);
      logLine(`<span class="t">${d.time}</span><span class="tag ${cls}">${LABELS[cls]}</span><span class="hexv ${cls}">${d.hex}</span>`);
    }
  };
  ws.onclose = () => setTimeout(connectWS, 1500);
}

function doMark(){
  const inp = document.getElementById('markinput');
  const text = inp.value.trim();
  if (!text) return;
  const now = new Date().toTimeString().slice(0,12);
  logLine(`<span class="t">${now}</span><span class="tag mark">marca</span><span class="hexv mark">${text}</span>`);
  inp.value = '';
}
document.getElementById('markbtn').addEventListener('click', doMark);
document.getElementById('markinput').addEventListener('keydown', e => { if (e.key==='Enter') doMark(); });

connectWS();
</script>
</body>
</html>
